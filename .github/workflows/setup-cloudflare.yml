name: Finalize Cloudflare Pages DNS

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ZONE: apphane.dev
      CLOUDFLARE_PAGES_DOMAIN: karkas.apphane.dev
      CLOUDFLARE_PAGES_HOSTNAME: karkas.pages.dev

    steps:
      - name: Verify configuration
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "::error::CLOUDFLARE_API_TOKEN is unavailable"; exit 1; }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "::error::CLOUDFLARE_ACCOUNT_ID is unavailable"; exit 1; }

      - name: Create Pages DNS record
        run: |
          zone_id="$({
            curl --fail-with-body --silent --show-error --get \
              --url "https://api.cloudflare.com/client/v4/zones" \
              --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              --data-urlencode "name=$CLOUDFLARE_ZONE" \
              --data-urlencode "account.id=$CLOUDFLARE_ACCOUNT_ID"
          } | jq -er '.result | if length == 1 then .[0].id else error("expected exactly one zone") end')"

          curl --fail-with-body --silent --show-error \
            --request POST \
            --url "https://api.cloudflare.com/client/v4/zones/$zone_id/dns_records" \
            --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            --header "Content-Type: application/json" \
            --data "{\"type\":\"CNAME\",\"name\":\"$CLOUDFLARE_PAGES_DOMAIN\",\"content\":\"$CLOUDFLARE_PAGES_HOSTNAME\",\"ttl\":1,\"proxied\":true}" \
            | jq -e '.success == true'
