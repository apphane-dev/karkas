name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Nub
        uses: nubjs/setup-nub@47e5e7393d50f4e9544ddaf756aa277972afba2d # v0
        with:
          cache-dependency-path: lock.yaml

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Config mise
        run: mise settings experimental=true

      - name: Install dependencies
        run: nub ci

      - name: Build artifacts
        run: mise run build:cf-pages

      - name: Deploy to Cloudflare Pages
        # Call wrangler directly rather than via cloudflare/wrangler-action.
        # The action runs `npm i wrangler` inside the repo, which triggers npm's
        # full-tree resolution and fails on the project's nub-only peer deps.
        # `npx --yes` fetches wrangler into an isolated cache and runs it, never
        # touching the project tree. wrangler reads the token/account from env.
        run: npx --yes wrangler@4 pages deploy .var/dist/cf-pages --project-name=karkas --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
