name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Config mise
        run: mise settings experimental=true

      - name: Cache Bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.bun/install/cache
            node_modules/.vite
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Fallow audit
        uses: fallow-rs/fallow@8c5618273a1c514abede395ba9cc1de37a158425 # v2.83.0
        with:
          version: 2.83.0
          command: audit
          config: .config/fallow.toml
          format: json
          fail-on-issues: true
          comment: true
          annotations: true
          artifacts-dir: .var/fallow

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run CI checks
        run: mise run ci
        env:
          CI: true

      - name: Upload coverage reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: success()
        with:
          name: coverage-reports
          path: coverage/
          retention-days: 30

      - name: Generate coverage summary
        if: success()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
            jq --arg cwd "$PWD/" 'walk(if type == "string" then gsub($cwd; "") else . end)' coverage/coverage-summary.json >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
