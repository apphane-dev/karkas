[vars]
build_dir = ".var/dist"
webapp_out_dir = "{{ vars.build_dir }}/webapp"
storybook_out_dir = "{{ vars.build_dir }}/storybook"
site_out_dir = "{{ vars.build_dir }}/site"
cf_pages_out_dir = "{{ vars.build_dir }}/cf-pages"

# exposing defaults to terminal so that
# direct commands can be run consistently with tasks
[env]
# asserted in vite.config.ts
WEBAPP_OUT_DIR = "{{ vars.webapp_out_dir }}"
WEBAPP_BASE_URL = "/"
# asserted in .storybook/main.ts
STORYBOOK_BASE_URL = "/"
# expected in .github/workflows/deploy.yml
CF_PAGES_OUT_DIR = "{{ vars.cf_pages_out_dir }}"

[tasks."build:webapp:base"]
hide = true
usage = '''
arg "<dir>" env="WEBAPP_OUT_DIR" default="{{ vars.webapp_out_dir }}" help="Output directory for the webapp build"
arg "<base>" env="WEBAPP_BASE_URL" default="/" help="Base URL for the webapp"
'''
run = "WEBAPP_OUT_DIR=${usage_dir?} WEBAPP_BASE_URL=${usage_base?} vp build"

[tasks."build:webapp"]
description = "Build Application"
depends = ["prepare:codegen"]
run = "mise run build:webapp:base"
sources = ["src/**/*.{ts,tsx}", "index.html", "vite.config.ts"]
outputs = ["{{ vars.webapp_out_dir }}/**/*"]

[tasks."build:storybook:base"]
hide = true
usage = '''
arg "<dir>" env="STORYBOOK_OUT_DIR" default="{{ vars.storybook_out_dir }}" help="Output directory for the Storybook build"
arg "<base>" env="STORYBOOK_BASE_URL" default="/" help="Base URL for the Storybook"
'''
run = "STORYBOOK_BASE_URL=${usage_base?} storybook build -o ${usage_dir?}"

[tasks."build:storybook"]
description = "Build Storybook"
depends = ["prepare:codegen"]
run = "mise run build:storybook:base"
sources = ["src/**/*.{ts,tsx,stories.tsx}", ".storybook/**/*"]
outputs = ["{{ vars.storybook_out_dir }}/**/*"]

[tasks."build:site:base"]
hide = true
usage = '''
arg "<dir>" env="SITE_OUT_DIR" default="{{ vars.site_out_dir }}" help="Output directory for the landing site build"
'''
# astro resolves a relative --outDir against --root (site/), so make it
# absolute against the repo root (the task's CWD) to target the real path.
run = "astro build --root site --config astro.config.mjs --outDir $(pwd)/${usage_dir?}"

[tasks."build:site"]
description = "Build landing site (Astro)"
run = "mise run build:site:base"
sources = ["site/**/*.{astro,ts,css,md}", "site/astro.config.mjs"]
outputs = ["{{ vars.site_out_dir }}/**/*"]

[tasks."build"]
description = "Run all build tasks"
run = [{ task = "build:webapp" }, { task = "build:storybook" }, { task = "build:site" }]

[tasks."build:cf-pages"]
description = "Prepare deployment artifacts for Cloudflare Pages (combine builds)"
depends = ["prepare:codegen"]
env = { VITE_ENABLE_MSW = "true", VITE_CONNECT_LOGGER = "true" }
# Order matters: the landing site is built first into the artifact root, then
# the demo SPA fills /demo/ and Storybook /storybook/. Astro cleans its own
# outDir on build, so it must run before the sub-path builds that share it.
run = [
	"mise run build:site:base {{ vars.cf_pages_out_dir }}",
	"mise run build:webapp:base {{ vars.cf_pages_out_dir }}/demo /demo/",
	"mise run build:storybook:base {{ vars.cf_pages_out_dir }}/storybook /storybook/",
]
sources = [
	"src/**/*.{ts,tsx}",
	"index.html",
	"vite.config.ts",
	".storybook/**/*",
	"site/**/*.{astro,ts,css,md}",
	"site/astro.config.mjs",
]
outputs = ["{{ vars.cf_pages_out_dir }}/**/*"]

