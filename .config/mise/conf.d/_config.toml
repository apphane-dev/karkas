min_version = "2026.4.18" # required for [deps] (renamed from [prepare])

[tools]
bun = "1.3.14"
node = "lts"
jq = "latest"
vp = "latest"

[task_config]
dir = "{{ config_root }}"

[env]
'_'.path = { path = "./node_modules/.bin" }
STORYBOOK_ENABLE_CRASH_REPORTS = 1

[deps.bun]
auto = true

[shell_alias]
mr = "mise run"
