[tasks.format]
description = "Format code with oxfmt"
alias = "fmt"
run = "oxfmt --write ."

[tasks."format:check"]
description = "Check code formatting"
alias = "fmt:check"
run = "oxfmt --check ."

[tasks.lint]
description = "Lint code with oxlint"
run = "oxlint ."

[tasks."lint:fix"]
description = "Lint code and apply fixes with oxlint"
run = "oxlint --fix ."

[tasks.typecheck]
description = "Type check with TypeScript 7 native preview"
alias = "tc"
run = "tsgo -b"

[tasks."lint:steiger"]
description = "Check FSD architecture with steiger"
run = "bun scripts/steiger.ts"

[tasks."lint:fallow"]
description = "Check dead code, duplication, and complexity with Fallow"
run = [{ tasks = ["lint:fallow:dead-code", "lint:fallow:dupes", "lint:fallow:health"] }]

[tasks."lint:fallow:dead-code"]
description = "Check for dead-code findings against the Fallow baseline"
run = "fallow dead-code --config .config/fallow.toml --fail-on-issues"

[tasks."lint:fallow:dupes"]
description = "Check for duplicate-code findings against the Fallow baseline"
run = "fallow dupes --config .config/fallow.toml --fail-on-issues"

[tasks."lint:fallow:health"]
description = "Check for new complexity findings against the Fallow baseline"
run = "fallow health --config .config/fallow.toml --complexity --fail-on-issues"

[tasks."lint:fallow:fix:preview"]
description = "Preview Fallow's unused-export and dependency autofixes"
run = "fallow fix --config .config/fallow.toml --dry-run"

[tasks."lint:fallow:fix"]
description = "Apply Fallow's unused-export and dependency autofixes"
run = "fallow fix --config .config/fallow.toml --yes"

[tasks."lint:paraglide-tree-shaking"]
description = "Verify unused translations are tree-shaken from the production bundle"
depends = ["build:webapp"]
run = "bun scripts/check-tree-shaking.ts"

[tasks.validate]
description = "Run all quality checks (format, lint, typecheck, test). Default validation task for LLMs"
env = { VITE_CONNECT_LOGGER = "false" }
run = [ #
	{ task = "prepare" },
	{ task = "format" },
	{ task = "lint:fix" },
	{ task = "test:coverage" },
	{ tasks = ["typecheck", "lint:steiger", "lint:fallow"] },
	{ task = "lint:paraglide-tree-shaking" },
]

[tasks.ci]
description = "Run all CI checks. No auto-fixes"
env = { VITE_CONNECT_LOGGER = "false" }
run = [
	{ tasks = [
		"prepare:panda",
		"prepare:paraglide",
	] },
	{ task = "format:check" },
	{ task = "lint" },
	{ task = "test:coverage" },
	{ tasks = [
		"typecheck",
		"lint:steiger",
		"lint:fallow",
	] },
	{ task = "build" },
	{ task = "lint:paraglide-tree-shaking" },
]
