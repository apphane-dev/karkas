entry = ["scripts/**/*.ts"]
# `@typescript/native`: TypeScript 7 compiler, not imported by source.
# `idb-keyval`: optional dependency of the @reatom/core v1001 pkg.pr.new
# preview (IndexedDB persistence). The app doesn't use it directly, but the
# Storybook/Vite optimizer eagerly analyzes reatom's dynamic import, so the
# package must be resolvable. Drop once #1294 ships to stable npm.
# `storybook`: imported only by the test-actor factory in `src/shared/test`
# (a Storybook/kahraman actor harness), which Fallow classifies as production
# because it isn't named `*.test.ts`. It never runs outside Storybook/tests.
ignoreDependencies = ["@typescript/native", "idb-keyval", "storybook"]

# Park UI and generated assets are committed vendor/generated code; keep them out of findings.
ignorePatterns = [
	"public/mockServiceWorker.js",
	"scripts/steiger/**",
	"src/paraglide/**",
	"src/shared/components/ui/**",
	"src/shared/styled-system/**",
	"theme/recipes/**",
	"site/**",
]

[duplicates]
ignore = ["messages/**", "src/**/*.stories.tsx"]
ignoreImports = true
